name: Execute Upstox Trades

on:
  workflow_dispatch:
    inputs:
      upstox_code:
        description: 'Upstox Auth Code from redirect URL (copy the code parameter)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance numpy

      - name: Run Execution Script
        env:
          UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
          UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
          UPSTOX_REDIRECT_URI: ${{ secrets.UPSTOX_REDIRECT_URI }}
          UPSTOX_AUTH_CODE: ${{ inputs.upstox_code }}
          DRY_RUN: ${{ secrets.DRY_RUN || 'false' }}
          DUMMY_CAPITAL: ${{ secrets.DUMMY_CAPITAL }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python combined_breakout_strategy/auto_execute.py
