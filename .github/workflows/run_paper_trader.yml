name: Paper Trader — Daily Run (Comparative Master Strategies)

on:
  schedule:
    # 10:15 AM UTC = 3:45 PM IST  (Mon–Fri only)
    - cron: '15 10 * * 1-5'
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-paper-trader:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run comparative paper_trader.py (No-Stops)
        run: |
          cd compare_strats
          python paper_trader.py
          cd ..

      - name: Run comparative paper_trader_strat_bullet_proof.py (Bulletproof)
        run: |
          cd compare_strats
          python paper_trader_strat_bullet_proof.py
          cd ..

      - name: Run comparative paper_trader_strat_v3_ml.py (V3 ML)
        run: |
          cd compare_strats
          python paper_trader_strat_v3_ml.py
          cd ..

      - name: Run comparative paper_trader_strat_v4_heuristic.py (V4 Heuristic)
        run: |
          cd compare_strats
          python paper_trader_strat_v4_heuristic.py
          cd ..

      - name: Run comparative paper_trader_strat_ensemble_70_30.py (V5 Ensemble)
        run: |
          cd compare_strats
          python paper_trader_strat_ensemble_70_30.py
          cd ..

      - name: Run institutional pairs paper trader (V6 Pairs)
        run: |
          cd compare_strats
          python paper_trader_strat_pairs.py
          cd ..

      - name: Run V7 Large-Cap paper trader (V7 Apex Large)
        run: |
          cd compare_strats
          python paper_trader_strat_v7_large.py
          cd ..

      - name: Run V7 Mid-Cap paper trader (V7 Apex Mid)
        run: |
          cd compare_strats
          python paper_trader_strat_v7_mid.py
          cd ..

      - name: Run V7 Hybrid paper trader (V7 Apex Hybrid)
        run: |
          cd compare_strats
          python paper_trader_strat_v7_hybrid.py
          cd ..

      - name: Run V7 Hybrid 50k paper trader (Chota Dhurandhar)
        run: |
          cd compare_strats
          python paper_trader_strat_v7_hybrid_50k.py
          cd ..

      - name: Run Cheap V7 20k paper trader (Cheap V7)
        run: |
          cd compare_strats
          python paper_trader_strat_v7_cheap_20k.py
          cd ..

      - name: Commit and push all results
        run: |
          git config --local user.email "papertrader@github-actions.bot"
          git config --local user.name  "Paper Trader Bot"
          git add compare_strats/states/ compare_strats/data/ compare_strats/charts/ compare_strats/reports/ || true
          git diff --staged --quiet || git commit -m "Paper trader comparison update: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
