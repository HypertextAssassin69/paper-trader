name: Paper Trader — Daily Run (Comparative Master Strategies)

on:
  schedule:
    # 10:15 AM UTC = 3:45 PM IST  (Mon–Fri only)
    - cron: '15 10 * * 1-5'
    # Run walk-forward backtest every Sunday at 6 AM IST (00:30 AM UTC)
    - cron: '30 0 * * 0'
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-paper-trader:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update stock universe (screen & rotate tickers)
        run: python D:\College\analyst\update_universe.py
        continue-on-error: true  # If screening fails, keep running with last known good tickers

      - name: Run Dhurandhar V8 Master Hybrid paper trader (Capital: 1L - 15L)
        run: |
          cd compare_strats
          python v8_improved_pairs_engine.py
          python paper_trader_strat_v7_hybrid.py
          cd ..

      - name: Run Chota Dhurandhar 50k paper trader (Capital: 50k)
        run: |
          cd compare_strats
          python paper_trader_strat_v7_hybrid_50k.py
          cd ..

      - name: Run Cheap V7 20k paper trader (Capital: 20k)
        run: |
          cd compare_strats
          python paper_trader_strat_v7_cheap_20k.py
          cd ..

      - name: Commit and push all results
        run: |
          git config --local user.email "papertrader@github-actions.bot"
          git config --local user.name  "Paper Trader Bot"
          git add compare_strats/states/ compare_strats/data/ compare_strats/charts/ compare_strats/reports/ || true
          git diff --staged --quiet || git commit -m "Paper trader comparison update: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
