name: Paper Trader — Daily Run (6 Strategies)

on:
  schedule:
    # 10:15 AM UTC = 3:45 PM IST  (Mon–Fri only)
    - cron: '15 10 * * 1-5'
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-paper-trader:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper_trader.py (all 6 strategies)
        run: python paper_trader.py

      - name: Commit and push all results
        run: |
          git config --local user.email "papertrader@github-actions.bot"
          git config --local user.name  "Paper Trader Bot"
          git add states/ data/ charts/ reports/ || true
          git diff --staged --quiet || git commit -m "Paper trader update: $(date +'%Y-%m-%d')"
          git push
